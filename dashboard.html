<!DOCTYPE html>
<html>
<head>
<title>INDOTEX ADMIN</title>
<style>
body { background:#0b1220; color:white; font-family:sans-serif; }
button { padding:10px; margin:5px; cursor:pointer; }
input { padding:10px; margin:5px; width:200px; }
.card { background:#1e293b; padding:20px; border-radius:10px; width:300px; margin:auto; margin-top:100px; }
</style>
</head>
<body>

<div class="card">
  <h2>Create User</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" placeholder="Password"><br>
  <button onclick="createUser()">Create</button>
</div>

<script>
const API = "https://indotex-license-system-production.up.railway.app";

async function createUser() {
  try {
    const res = await fetch(API + "/api/users", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    console.log(data);

    if (data.success) {
      alert("✅ User berhasil dibuat");
    } else {
      alert("❌ Gagal");
    }

  } catch (e) {
    console.log(e);
    alert("❌ Gagal connect ke server!");
  }
}
</script>

</body>
</html>
