<script>
const API = "https://indotex-license-system-production.up.railway.app";

// ================= USERS =================
async function loadUsers() {
  try {
    const res = await fetch(API + "/api/users");
    const data = await res.json();

    console.log("USERS:", data);

    let html = "<tr><th>ID</th><th>Username</th></tr>";

    const select = document.getElementById("assignUser");
    select.innerHTML = "<option value=''>Pilih User</option>";

    data.users.forEach(u => {
      html += `<tr><td>${u.id}</td><td>${u.username}</td></tr>`;
      select.innerHTML += `<option value="${u.id}">${u.username}</option>`;
    });

    document.getElementById("userTable").innerHTML = html;

  } catch (err) {
    console.error(err);
    alert("Gagal load users ❌");
  }
}

// ================= SCRIPTS =================
async function loadScripts() {
  try {
    const res = await fetch(API + "/api/scripts");
    const data = await res.json();

    console.log("SCRIPTS:", data);

    let html = "<tr><th>ID</th><th>Name</th></tr>";

    const select = document.getElementById("assignScript");
    select.innerHTML = "<option value=''>Pilih Script</option>";

    data.scripts.forEach(s => {
      html += `<tr><td>${s.id}</td><td>${s.name}</td></tr>`;
      select.innerHTML += `<option value="${s.id}">${s.name}</option>`;
    });

    document.getElementById("scriptTable").innerHTML = html;

  } catch (err) {
    console.error(err);
    alert("Gagal load scripts ❌");
  }
}

// ================= CREATE USER =================
async function createUser() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if (!username || !password) {
    alert("Isi semua field!");
    return;
  }

  try {
    const res = await fetch(API + "/api/users", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    console.log("CREATE USER:", data);

    alert("User dibuat!");
    loadUsers();

  } catch (err) {
    console.error(err);
    alert("Gagal create user ❌");
  }
}

// ================= CREATE SCRIPT =================
async function createScript() {
  const name = document.getElementById("scriptName").value;

  if (!name) {
    alert("Isi nama script!");
    return;
  }

  try {
    const res = await fetch(API + "/api/scripts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name })
    });

    const data = await res.json();

    console.log("CREATE SCRIPT:", data);

    alert("Script dibuat!");
    loadScripts();

  } catch (err) {
    console.error(err);
    alert("Gagal create script ❌");
  }
}

// ================= ASSIGN =================
async function assign() {
  const user_id = document.getElementById("assignUser").value;
  const script_id = document.getElementById("assignScript").value;
  const expire = document.getElementById("expire").value;
  const device = document.getElementById("device").value;

  try {
    const res = await fetch(API + "/api/assign", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ user_id, script_id, expire, device })
    });

    const data = await res.json();

    console.log("ASSIGN:", data);

    alert("Assign berhasil!");

  } catch (err) {
    console.error(err);
    alert("Gagal assign ❌");
  }
}

// ================= AUTO LOAD =================
loadUsers();
loadScripts();
</script>
