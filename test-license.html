<!DOCTYPE html>
<html>
<head>
    <title>INDOTEX License Manager</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        pre {
            background: #111;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>INDOTEX License Manager</h1>

<h2>Generate License</h2>

<input type="text" id="customerName" placeholder="Customer Name">
<input type="email" id="customerEmail" placeholder="Customer Email">

<select id="durationType">
    <option value="1_month">1 Month</option>
    <option value="3_month">3 Months</option>
    <option value="6_month">6 Months</option>
    <option value="12_month">12 Months</option>
    <option value="lifetime">Lifetime</option>
</select>

<input type="number" id="maxDevices" min="1" max="1000" value="1" placeholder="Max Devices">

<button onclick="generateLicense()">Generate License</button>

<hr>

<h2>Validate License</h2>
<input type="text" id="licenseKey" placeholder="License Key">
<button onclick="validateLicense()">Validate</button>

<hr>

<h2>Reset Device</h2>
<input type="text" id="resetLicenseKey" placeholder="License Key">
<button onclick="resetDevice()">Reset HWID</button>

<hr>

<h2>Update Status</h2>
<input type="text" id="statusLicenseKey" placeholder="License Key">

<select id="licenseStatus">
    <option value="active">Active</option>
    <option value="suspended">Suspended</option>
    <option value="banned">Banned</option>
</select>

<button onclick="updateStatus()">Update Status</button>

<hr>

<pre id="output"></pre>

<script>
const API = "http://localhost:3000/api/license";

function showOutput(data) {
    document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
}

async function generateLicense() {
    const res = await fetch(`${API}/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            customer_name: document.getElementById("customerName").value,
            customer_email: document.getElementById("customerEmail").value,
            duration_type: document.getElementById("durationType").value,
            max_devices: document.getElementById("maxDevices").value
        })
    });

    showOutput(await res.json());
}

async function validateLicense() {
    const res = await fetch(`${API}/validate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            license_key: document.getElementById("licenseKey").value,
            device_id: "TEST-PC-001"
        })
    });

    showOutput(await res.json());
}

async function resetDevice() {
    const res = await fetch(`${API}/reset-device`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            license_key: document.getElementById("resetLicenseKey").value
        })
    });

    showOutput(await res.json());
}

async function updateStatus() {
    const res = await fetch(`${API}/update-status`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            license_key: document.getElementById("statusLicenseKey").value,
            status: document.getElementById("licenseStatus").value
        })
    });

    showOutput(await res.json());
}
</script>

</body>
</html>
